<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HawkPhish</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { dark: { 100: '#1a1a2e', 200: '#16213e', 300: '#0f3460', 400: '#e94560' }}}}
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        *{font-family:'Inter',sans-serif;box-sizing:border-box}
        html,body{height:100%;overflow:hidden}
        body{background:#0f0f23}
        .glass{background:rgba(255,255,255,.05);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1)}
        .glow{box-shadow:0 0 20px rgba(233,69,96,.3)}
        .nav-item:hover{background:rgba(233,69,96,.15)}
        .nav-item.active{background:rgba(233,69,96,.2);border-left:3px solid #e94560}
        .stat-card:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,0,0,.3)}
        .btn-primary{background:linear-gradient(135deg,#e94560,#c23152)}
        .btn-primary:hover{background:linear-gradient(135deg,#c23152,#a02040)}
        .btn-success{background:linear-gradient(135deg,#22c55e,#16a34a)}
        .btn-success:hover{background:linear-gradient(135deg,#16a34a,#15803d)}
        .fade-in{animation:fadeIn .3s ease-in}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .pulse-dot{animation:pulse 2s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
        ::-webkit-scrollbar{width:6px}
        ::-webkit-scrollbar-track{background:#1a1a2e}
        ::-webkit-scrollbar-thumb{background:#e94560;border-radius:3px}
        select option{background:#1a1a2e;color:#fff;padding:8px}
        select{color-scheme:dark}
        .sidebar-open .sidebar{transform:translateX(0)}
        @media(max-width:768px){
            .sidebar{position:fixed;z-index:50;transform:translateX(-100%);transition:transform .3s;width:260px;height:100vh}
            .sidebar-open .sidebar{transform:translateX(0)}
            .sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:40;display:none}
            .sidebar-open .sidebar-overlay{display:block}
        }
        .preview-frame{background:#fff;border-radius:8px;overflow:hidden;min-height:300px}
        .preview-frame iframe{width:100%;height:100%;border:none;min-height:300px}
        .tab-active{border-bottom:2px solid #e94560;color:#e94560}
        .toast{position:fixed;top:20px;right:20px;z-index:100;animation:slideIn .3s ease-out}
        @keyframes slideIn{from{opacity:0;transform:translateX(100px)}to{opacity:1;transform:translateX(0)}}
        .spinner{border:3px solid rgba(255,255,255,.1);border-top-color:#e94560;border-radius:50%;width:20px;height:20px;animation:spin .6s linear infinite;display:inline-block}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body class="text-white h-screen overflow-hidden">
    <div id="app" class="flex h-screen">
        <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
        <aside class="sidebar w-64 glass border-r border-white/10 flex flex-col h-full overflow-hidden">
            <div class="p-6 border-b border-white/10 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <img src="assets/logo.png" alt="HawkPhish" class="w-10 h-10 rounded-xl object-cover">
                    <div><h1 class="text-xl font-bold">HawkPhish</h1><p class="text-xs text-gray-400">v1.1.0</p></div>
                </div>
                <button onclick="toggleSidebar()" class="md:hidden text-gray-400 hover:text-white"><i class="fas fa-times text-xl"></i></button>
            </div>
            <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
                <a href="#" onclick="showPage('dashboard')" class="nav-item active flex items-center gap-3 px-4 py-3 rounded-lg text-sm"><i class="fas fa-chart-pie w-5"></i>Dashboard</a>
                <a href="#" onclick="showPage('campaigns')" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg text-sm"><i class="fas fa-rocket w-5"></i>Campaigns</a>
                <a href="#" onclick="showPage('templates')" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg text-sm"><i class="fas fa-file-code w-5"></i>Templates</a>
                <a href="#" onclick="showPage('landing-pages')" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg text-sm"><i class="fas fa-globe w-5"></i>Landing Pages</a>
                <a href="#" onclick="showPage('groups')" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg text-sm"><i class="fas fa-users w-5"></i>Groups</a>
                <a href="#" onclick="showPage('smtp')" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg text-sm"><i class="fas fa-envelope w-5"></i>SMTP Configs</a>
                <a href="#" onclick="showPage('proxies')" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg text-sm"><i class="fas fa-shield-halved w-5"></i>Proxies</a>
                <a href="#" onclick="showPage('smtp-server')" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg text-sm"><i class="fas fa-server w-5"></i>SMTP Server</a>
                <a href="#" onclick="showPage('audit-logs')" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg text-sm"><i class="fas fa-clipboard-list w-5"></i>Audit Logs</a>
                <div class="border-t border-white/10 my-2"></div>
                <a href="#" onclick="showPage('about')" class="nav-item flex items-center gap-3 px-4 py-3 rounded-lg text-sm"><i class="fas fa-info-circle w-5"></i>About</a>
            </nav>
            <div class="p-4 border-t border-white/10">
                <div class="glass rounded-lg p-3 text-center">
                    <p class="text-xs text-gray-400">Authorized Use Only</p>
                    <p class="text-xs text-red-400 mt-1"><i class="fas fa-shield-halved"></i> Red Team Tool</p>
                </div>
            </div>
        </aside>
        <main class="flex-1 h-full overflow-y-auto">
            <div class="md:hidden p-4 border-b border-white/10 glass flex items-center gap-3">
                <button onclick="toggleSidebar()" class="text-gray-400 hover:text-white"><i class="fas fa-bars text-xl"></i></button>
                <img src="assets/logo.png" alt="HawkPhish" class="w-8 h-8 rounded-lg object-cover">
                <span class="font-bold">HawkPhish</span>
            </div>
            <div id="content" class="p-4 md:p-8 fade-in"></div>
        </main>
    </div>

    <script>
    const API = '';
    let currentPage = 'dashboard';

    async function api(path, method = 'GET', body = null) {
        try {
            const opts = { method, headers: { 'Content-Type': 'application/json' } };
            if (body) opts.body = JSON.stringify(body);
            const r = await fetch(API + path, opts);
            if (!r.ok) { console.warn('API error:', path, r.status); return null; }
            return r.json();
        } catch(e) { console.warn('API failed:', path, e.message); return null; }
    }

    function toggleSidebar() {
        document.getElementById('app').classList.toggle('sidebar-open');
    }

    function toast(msg, type = 'success') {
        const colors = { success: 'bg-green-500', error: 'bg-red-500', info: 'bg-blue-500', warning: 'bg-yellow-500' };
        const icons = { success: 'check-circle', error: 'exclamation-circle', info: 'info-circle', warning: 'exclamation-triangle' };
        const el = document.createElement('div');
        el.className = `toast glass rounded-lg px-4 py-3 flex items-center gap-3 ${colors[type]}/20 border border-${type === 'success' ? 'green' : type === 'error' ? 'red' : type === 'info' ? 'blue' : 'yellow'}-500/30`;
        el.innerHTML = `<i class="fas fa-${icons[type]} text-${type === 'success' ? 'green' : type === 'error' ? 'red' : type === 'info' ? 'blue' : 'yellow'}-400"></i><span class="text-sm">${msg}</span>`;
        document.body.appendChild(el);
        setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; setTimeout(() => el.remove(), 300); }, 3000);
    }

    function statusColor(s) {
        const c = { draft:'bg-gray-500/20 text-gray-400', queued:'bg-yellow-500/20 text-yellow-400', running:'bg-green-500/20 text-green-400', paused:'bg-yellow-500/20 text-yellow-400', completed:'bg-blue-500/20 text-blue-400', cancelled:'bg-red-500/20 text-red-400' };
        return c[s] || 'bg-gray-500/20 text-gray-400';
    }

    function showModal(title, content, wide = false) {
        const existing = document.getElementById('modal');
        if (existing) existing.remove();
        const modal = document.createElement('div');
        modal.id = 'modal';
        modal.className = 'fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4';
        modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
        modal.innerHTML = `<div class="glass rounded-2xl p-6 md:p-8 w-full ${wide ? 'max-w-3xl' : 'max-w-lg'} mx-4 fade-in max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6"><h3 class="text-xl font-bold">${title}</h3><button onclick="document.getElementById('modal').remove()" class="text-gray-400 hover:text-white"><i class="fas fa-times text-xl"></i></button></div>
            ${content}</div>`;
        document.body.appendChild(modal);
    }

    async function showPage(page) {
        currentPage = page;
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => {
            if (n.textContent.trim().toLowerCase().includes(page.replace('-', ' '))) n.classList.add('active');
        });
        const el = document.getElementById('content');
        el.className = 'p-4 md:p-8 fade-in';
        document.getElementById('app').classList.remove('sidebar-open');
        switch(page) {
            case 'dashboard': return renderDashboard(el);
            case 'campaigns': return renderCampaigns(el);
            case 'templates': return renderTemplates(el);
            case 'landing-pages': return renderLandingPages(el);
            case 'groups': return renderGroups(el);
            case 'smtp': return renderSMTP(el);
            case 'proxies': return renderProxies(el);
            case 'smtp-server': return renderSMTPServer(el);
            case 'audit-logs': return renderAuditLogs(el);
            case 'about': return renderAbout(el);
        }
    }

    // ========== DASHBOARD ==========
    async function renderDashboard(el) {
        el.innerHTML = '<div class="flex items-center justify-center py-20"><div class="spinner"></div><span class="ml-3 text-gray-400">Loading dashboard...</span></div>';
        const fallback = {campaigns:{total:0,running:0,completed:0},stats:{total_sent:0,total_opened:0,total_clicked:0,total_submitted:0,total_sessions:0,open_rate:0,click_rate:0,submit_rate:0},resources:{smtp_configs:0,groups:0,recipients:0}};
        const d = (await api('/api/dashboard')) || fallback;
        const feed = (await api('/api/live-feed?limit=20')) || [];
        const sessions = (await api('/api/sessions?limit=20')) || [];
        el.innerHTML = `
            <div class="flex items-center justify-between mb-8">
                <div><h2 class="text-2xl md:text-3xl font-bold">Dashboard</h2><p class="text-gray-400 mt-1">Real-time campaign tracking & target sessions</p></div>
                <div class="flex gap-2">
                    <button onclick="refreshDashboard()" class="glass px-4 py-2 rounded-lg text-sm font-medium hover:bg-white/10"><i class="fas fa-sync-alt mr-2 text-green-400"></i>Refresh</button>
                    <a href="/api/campaigns/report/pdf/summary" target="_blank" class="glass px-4 py-2 rounded-lg text-sm font-medium hover:bg-white/10"><i class="fas fa-file-pdf mr-2 text-red-400"></i>PDF</a>
                </div>
            </div>
            <div class="grid grid-cols-2 lg:grid-cols-5 gap-4 mb-8">
                <div class="stat-card glass rounded-xl p-4"><p class="text-gray-400 text-xs">Sent</p><p class="text-2xl font-bold mt-1">${d.stats.total_sent}</p></div>
                <div class="stat-card glass rounded-xl p-4"><p class="text-gray-400 text-xs">Opened</p><p class="text-2xl font-bold mt-1">${d.stats.open_rate}%</p></div>
                <div class="stat-card glass rounded-xl p-4"><p class="text-gray-400 text-xs">Clicked</p><p class="text-2xl font-bold mt-1">${d.stats.click_rate}%</p></div>
                <div class="stat-card glass rounded-xl p-4"><p class="text-gray-400 text-xs">Credentials</p><p class="text-2xl font-bold mt-1 text-red-400">${d.stats.total_submitted}</p></div>
                <div class="stat-card glass rounded-xl p-4"><p class="text-gray-400 text-xs">Sessions</p><p class="text-2xl font-bold mt-1 text-purple-400">${d.stats.total_sessions}</p></div>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
                <div class="glass rounded-xl p-6">
                    <h3 class="font-semibold mb-4"><i class="fas fa-bolt mr-2 text-yellow-400"></i>Live Feed</h3>
                    <div class="space-y-2 max-h-[400px] overflow-y-auto" id="live-feed-list">
                        ${feed.map(f => `
                            <div class="flex items-center gap-3 p-2 rounded-lg hover:bg-white/5 transition-all text-sm">
                                <div class="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0 ${f.status === 'submitted' ? 'bg-red-500/20' : f.status === 'clicked' ? 'bg-yellow-500/20' : 'bg-green-500/20'}">
                                    <i class="fas fa-${f.status === 'submitted' ? 'key text-red-400' : f.status === 'clicked' ? 'mouse-pointer text-yellow-400' : 'envelope-open text-green-400'}"></i>
                                </div>
                                <div class="flex-1 min-w-0">
                                    <div class="font-medium truncate">${f.email || f.recipient_name || 'Unknown'}</div>
                                    <div class="text-xs text-gray-500">${f.browser} ${f.os ? 'on ' + f.os : ''} ${f.country ? '&#127758; ' + f.country : ''}</div>
                                </div>
                                <div class="text-right flex-shrink-0">
                                    <div class="text-xs text-gray-500">${f.time ? new Date(f.time).toLocaleTimeString() : ''}</div>
                                    <div class="text-xs ${f.status === 'submitted' ? 'text-red-400' : f.status === 'clicked' ? 'text-yellow-400' : 'text-green-400'}">${f.status}</div>
                                </div>
                            </div>`).join('')}
                        ${feed.length === 0 ? '<p class="text-center text-gray-500 py-8">No events yet — start a campaign to see live tracking</p>' : ''}
                    </div>
                </div>
                <div class="glass rounded-xl p-6">
                    <h3 class="font-semibold mb-4"><i class="fas fa-users mr-2 text-purple-400"></i>Target Sessions</h3>
                    <div class="space-y-2 max-h-[400px] overflow-y-auto" id="sessions-list">
                        ${sessions.map(s => `
                            <div onclick="showSessionDetail(${s.id})" class="flex items-center gap-3 p-2 rounded-lg hover:bg-white/5 transition-all cursor-pointer text-sm">
                                <div class="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0 ${s.status === 'submitted' ? 'bg-red-500/20' : s.status === 'clicked' ? 'bg-yellow-500/20' : 'bg-green-500/20'}">
                                    <i class="fas fa-${s.status === 'submitted' ? 'skull-crossbones text-red-400' : s.status === 'clicked' ? 'crosshairs text-yellow-400' : 'user-secret text-green-400'}"></i>
                                </div>
                                <div class="flex-1 min-w-0">
                                    <div class="font-medium truncate">${s.email}</div>
                                    <div class="text-xs text-gray-500">${s.browsers.join(', ') || 'Unknown browser'} ${s.countries.length ? '&#127758; ' + s.countries.join(', ') : ''}</div>
                                </div>
                                <div class="text-right flex-shrink-0">
                                    <div class="text-xs text-gray-500">${s.total_events} events</div>
                                    <div class="text-xs text-gray-500">${s.ip_addresses.length} IP${s.ip_addresses.length !== 1 ? 's' : ''}</div>
                                </div>
                            </div>`).join('')}
                        ${sessions.length === 0 ? '<p class="text-center text-gray-500 py-8">No sessions yet</p>' : ''}
                    </div>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="glass rounded-xl p-6">
                    <h3 class="font-semibold mb-4"><i class="fas fa-rocket mr-2 text-red-400"></i>Campaigns</h3>
                    <div class="space-y-2">
                        <div class="flex justify-between"><span class="text-gray-400">Total</span><span class="font-bold">${d.campaigns.total}</span></div>
                        <div class="flex justify-between"><span class="text-gray-400">Running</span><span class="font-bold text-green-400">${d.campaigns.running}</span></div>
                        <div class="flex justify-between"><span class="text-gray-400">Completed</span><span class="font-bold text-blue-400">${d.campaigns.completed}</span></div>
                    </div>
                </div>
                <div class="glass rounded-xl p-6">
                    <h3 class="font-semibold mb-4"><i class="fas fa-server mr-2 text-red-400"></i>Resources</h3>
                    <div class="space-y-2">
                        <div class="flex justify-between"><span class="text-gray-400">SMTP</span><span class="font-bold">${d.resources.smtp_configs}</span></div>
                        <div class="flex justify-between"><span class="text-gray-400">Groups</span><span class="font-bold">${d.resources.groups}</span></div>
                        <div class="flex justify-between"><span class="text-gray-400">Recipients</span><span class="font-bold">${d.resources.recipients}</span></div>
                    </div>
                </div>
                <div class="glass rounded-xl p-6">
                    <h3 class="font-semibold mb-4"><i class="fas fa-shield-halved mr-2 text-red-400"></i>System</h3>
                    <div class="space-y-2">
                        <div class="flex justify-between"><span class="text-gray-400">Version</span><span class="font-bold">1.2.0</span></div>
                        <div class="flex justify-between"><span class="text-gray-400">Status</span><span class="font-bold text-green-400"><span class="pulse-dot inline-block w-2 h-2 bg-green-400 rounded-full mr-1"></span>Online</span></div>
                        <div class="flex justify-between"><span class="text-gray-400">Platform</span><span class="font-bold">Cross-Platform</span></div>
                    </div>
                </div>
            </div>`;
    }

    function refreshDashboard() { showPage('dashboard'); toast('Dashboard refreshed', 'info'); }

    async function showSessionDetail(sessionId) {
        const s = await api('/api/sessions/' + sessionId);
        const statusColors = { sent: 'gray', opened: 'green', clicked: 'yellow', submitted: 'red' };
        const sc = statusColors[s.status] || 'gray';
        showModal(`Session: ${s.email}`, `
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <div class="glass rounded-lg p-3"><p class="text-xs text-gray-400">Status</p><p class="font-bold text-${sc}-400 capitalize">${s.status}</p></div>
                    <div class="glass rounded-lg p-3"><p class="text-xs text-gray-400">Events</p><p class="font-bold">${s.total_events}</p></div>
                    <div class="glass rounded-lg p-3"><p class="text-xs text-gray-400">Campaign</p><p class="font-bold text-sm">${s.campaign_name}</p></div>
                    <div class="glass rounded-lg p-3"><p class="text-xs text-gray-400">Name</p><p class="font-bold text-sm">${s.recipient_name || 'N/A'}</p></div>
                </div>
                <div class="glass rounded-lg p-3">
                    <p class="text-xs text-gray-400 mb-2">IP Addresses</p>
                    <div class="flex flex-wrap gap-1">${s.ip_addresses.map(ip => `<span class="px-2 py-0.5 bg-blue-500/20 text-blue-400 rounded text-xs font-mono">${ip}</span>`).join('') || '<span class="text-gray-500">None</span>'}</div>
                </div>
                <div class="grid grid-cols-3 gap-3">
                    <div class="glass rounded-lg p-3"><p class="text-xs text-gray-400 mb-1">Browsers</p><p class="text-sm">${s.browsers.join(', ') || 'N/A'}</p></div>
                    <div class="glass rounded-lg p-3"><p class="text-xs text-gray-400 mb-1">Devices</p><p class="text-sm">${s.devices.join(', ') || 'N/A'}</p></div>
                    <div class="glass rounded-lg p-3"><p class="text-xs text-gray-400 mb-1">Countries</p><p class="text-sm">${s.countries.join(', ') || 'N/A'}</p></div>
                </div>
                <div>
                    <h4 class="font-semibold mb-3"><i class="fas fa-stream mr-2 text-purple-400"></i>Event Timeline</h4>
                    <div class="space-y-2 max-h-[300px] overflow-y-auto">
                        ${(s.events || []).map(ev => {
                            const icon = ev.type === 'submit' ? 'key text-red-400' : ev.type === 'click' ? 'mouse-pointer text-yellow-400' : 'envelope-open text-green-400';
                            const bg = ev.type === 'submit' ? 'bg-red-500/20' : ev.type === 'click' ? 'bg-yellow-500/20' : 'bg-green-500/20';
                            return `<div class="flex items-center gap-3 p-2 rounded-lg bg-white/5">
                                <div class="w-8 h-8 rounded-lg flex items-center justify-center ${bg}"><i class="fas fa-${icon}"></i></div>
                                <div class="flex-1">
                                    <div class="text-sm font-medium capitalize">${ev.type === 'submit' ? 'Credential Captured' : ev.type === 'click' ? 'Link Clicked' : 'Email Opened'}</div>
                                    <div class="text-xs text-gray-500">${ev.browser || ''} ${ev.os || ''} ${ev.device || ''} ${ev.country ? '&#127758; ' + ev.country : ''} ${ev.city || ''}</div>
                                    <div class="text-xs text-gray-500">${ev.ip ? 'IP: ' + ev.ip : ''} ${ev.isp ? '| ' + ev.isp : ''}</div>
                                </div>
                                <div class="text-xs text-gray-500">${ev.time ? new Date(ev.time).toLocaleString() : ''}</div>
                            </div>`;
                        }).join('')}
                        ${(!s.events || s.events.length === 0) ? '<p class="text-center text-gray-500">No events</p>' : ''}
                    </div>
                </div>
            </div>`, true);
    }

    // ========== CAMPAIGNS ==========
    async function renderCampaigns(el) {
        const campaigns = (await api('/api/campaigns')) || [];
        el.innerHTML = `
            <div class="flex items-center justify-between mb-8">
                <div><h2 class="text-2xl md:text-3xl font-bold">Campaigns</h2><p class="text-gray-400 mt-1">Manage your phishing campaigns</p></div>
                <button onclick="showCreateCampaign()" class="btn-primary px-4 md:px-6 py-2.5 rounded-lg font-medium text-sm md:text-base"><i class="fas fa-plus mr-2"></i>New Campaign</button>
            </div>
            <div class="glass rounded-xl overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full min-w-[600px]">
                        <thead><tr class="border-b border-white/10 text-left text-gray-400 text-sm">
                            <th class="p-4">Name</th><th class="p-4">Status</th><th class="p-4">Sent</th><th class="p-4">Opened</th><th class="p-4">Clicked</th><th class="p-4">Submitted</th><th class="p-4">Actions</th>
                        </tr></thead>
                        <tbody>${campaigns.map(c => `

    async function createCampaign(e) {
        e.preventDefault();
        const templateId = document.getElementById('camp-template').value;
        const smtpId = document.getElementById('camp-smtp').value;
        const groupId = document.getElementById('camp-group').value;
        if (!templateId || !smtpId || !groupId) { toast('Please fill Template, SMTP, and Group', 'error'); return; }
        await api('/api/campaigns', 'POST', {
            name: document.getElementById('camp-name').value,
            template_id: parseInt(templateId),
            landing_page_id: parseInt(document.getElementById('camp-landing').value) || null,
            smtp_id: parseInt(smtpId),
            group_id: parseInt(groupId),
            use_proxies: document.getElementById('camp-use-proxies').checked,
            settings: {
                min_delay: parseInt(document.getElementById('camp-min-delay').value) || 3,
                max_delay: parseInt(document.getElementById('camp-max-delay').value) || 8,
                base_url: window.location.origin,
            },
            subject_rotation: parseInt(document.getElementById('camp-subj-rot').value) || 1,
            fromname_rotation: parseInt(document.getElementById('camp-name-rot').value) || 1,
            letter_rotation: document.getElementById('camp-letter-rot').checked,
            reply_to: document.getElementById('camp-reply-to').value || null,
            cc: document.getElementById('camp-cc').value || null,
            bcc: document.getElementById('camp-bcc').value || null,
            spoof_from: document.getElementById('camp-spoof').value || null,
            disclaimer_enabled: document.getElementById('camp-disclaimer').checked,
            attachments: [],
            custom_headers: {},
        });
        document.getElementById('modal').remove();
        toast('Campaign created!');
        showPage('campaigns');
    }

    function insertVar(fieldId, varName) {
        const el = document.getElementById(fieldId);
        el.value += varName;
        el.focus();
        previewTemplate();
    }

    function loadFileToField(input, fieldId) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            document.getElementById(fieldId).value = e.target.result;
            if (fieldId === 'tpl-html') previewTemplate();
            if (fieldId === 'tpl-edit-html') previewEditTemplate();
            if (fieldId === 'lp-html') {
                const frame = document.getElementById('lp-preview-frame');
                const container = document.getElementById('lp-preview-container');
                if (frame && container) { container.classList.remove('hidden'); frame.srcdoc = e.target.result; }
            }
            if (fieldId === 'lp-edit-html') {
                const frame = document.getElementById('lp-edit-preview-frame');
                const container = document.getElementById('lp-edit-preview-container');
                if (frame && container) { container.classList.remove('hidden'); frame.srcdoc = e.target.result; }
            }
            toast('File loaded: ' + file.name);
        };
        reader.readAsText(file);
        input.value = '';
    }

    function previewTemplate() {
        const html = document.getElementById('tpl-html')?.value || '';
        const container = document.getElementById('tpl-preview-container');
        const frame = document.getElementById('tpl-preview');
        if (html.trim() && container && frame) {
            container.classList.remove('hidden');
            frame.srcdoc = html;
        } else if (container) {
            container.classList.add('hidden');
        }
    }

        await api(`/api/groups/${groupId}/recipients`, 'POST', {

    async function bulkAddRecipients(groupId) {
        const raw = document.getElementById('rec-bulk').value.trim();
        if (!raw) { toast('Paste some emails first', 'error'); return; }
        const lines = raw.split('\n').filter(l => l.trim());
        let count = 0;
        for (const line of lines) {
            const parts = line.split(',').map(s => s.trim());
            const email = parts[0];
            if (!email || !email.includes('@')) continue;
            await api(`/api/groups/${groupId}/recipients`, 'POST', {
                email: email,
                first_name: parts[1] || '',
            });
            count++;
        }
        toast(`${count} recipients imported!`);
        showRecipients(groupId);
    }

        document.getElementById('smtp-host').value = defaults.host;
        document.getElementById('smtp-port').value = defaults.port;
        document.getElementById('smtp-tls').value = defaults.tls ? 'true' : 'false';

    async function createSMTP(e) {
        e.preventDefault();
        const data = {
            name: document.getElementById('smtp-name').value,
            provider: document.getElementById('smtp-provider').value,
            host: document.getElementById('smtp-host').value,
            port: parseInt(document.getElementById('smtp-port').value),
            username: document.getElementById('smtp-username').value,
            password: document.getElementById('smtp-password').value,
            from_email: document.getElementById('smtp-from-email').value,
            from_name: document.getElementById('smtp-from-name').value,
            use_tls: document.getElementById('smtp-tls').value === 'true',
            max_emails: parseInt(document.getElementById('smtp-max').value),
            profile_group: document.getElementById('smtp-profile').value || 'default',
        };
        const result = await api('/api/smtp', 'POST', data);
        document.getElementById('modal').remove();
        if (result.id) {
            toast('SMTP created! Validating connection...', 'info');
            const health = await api(`/api/smtp/${result.id}/health`, 'POST');
            if (health.healthy) {
                toast(`SMTP validated! Connection OK (${health.latency}ms)`, 'success');
            } else {
                toast(`SMTP saved but connection failed: ${health.error || 'Unknown error'}`, 'warning');
            }
            showPage('smtp');
        } else {
            toast('Failed to create SMTP', 'error');
        }
    }

    async function healthCheckSMTP(id, btn) {
        btn.innerHTML = '<span class="spinner"></span>';
        btn.disabled = true;
        const r = await api(`/api/smtp/${id}/health`, 'POST');
        btn.innerHTML = '<i class="fas fa-heartbeat mr-1"></i>Check';
        btn.disabled = false;
        if (r.healthy) {
            toast(`Healthy! (${r.latency}ms)`);
        } else {
            toast(`Failed: ${r.error || 'Connection error'}`, 'error');
        }
        showPage('smtp');
    }

    async function deleteSMTP(id) {
        if (!confirm('Delete this SMTP config?')) return;
        await api(`/api/smtp/${id}`, 'DELETE');
        toast('SMTP deleted');
        showPage('smtp');
    }

    async function testSendSMTP(id) {
        showModal('Test Send Email', `

                <input id="test-send-to" type="email" placeholder="your-email@gmail.com" class="w-full bg-white/10 border border-white/20 rounded-lg px-4 py-2.5" required>

    async function doTestSend(e, id) {
        e.preventDefault();
        const to = document.getElementById('test-send-to').value;
        const spoof = document.getElementById('test-send-spoof').value;
        document.getElementById('modal').remove();
        toast('Sending test email...', 'info');
        const r = await api(`/api/smtp/${id}/test-send`, 'POST', { to_email: to, spoof_from: spoof });
        if (r.success) {
            toast(`Test email sent to ${to}!`);
        } else {
            toast(`Failed: ${r.error}`, 'error');
        }
    }

    async function validateAllSMTP() {
        toast('Validating all SMTP configs...', 'info');
        const results = await api('/api/smtp/validate-all', 'POST');
        let healthy = 0, failed = 0;
        for (const r of results) {
            if (r.healthy) healthy++;
            else failed++;
        }
        if (failed === 0) {
            toast(`All ${healthy} SMTP configs are healthy!`);
        } else {
            toast(`${healthy} healthy, ${failed} failed — check SMTP cards`, 'warning');
        }
        showPage('smtp');
    }

    async function doBulkImportSMTP() {
        const raw = document.getElementById('bulk-smtp-input').value;
        if (!raw.trim()) { toast('Paste some SMTP configs first', 'error'); return; }
        document.getElementById('modal').remove();
        toast('Importing SMTP configs...', 'info');
        const r = await api('/api/smtp/bulk-import', 'POST', { configs: raw });
        if (r.imported > 0) {
            toast(`Imported ${r.imported} SMTP configs!${r.skipped > 0 ? ` (${r.skipped} skipped)` : ''}`);
        } else {
            toast('No configs could be parsed. Check the format.', 'error');
        }
        showPage('smtp');
    }

    async function startSMTPServer() {
        const host = document.getElementById('srv-host').value;
        const port = parseInt(document.getElementById('srv-port').value);
        toast('Starting SMTP server...', 'info');
        const r = await api('/api/smtp-server/start', 'POST', {host, port});
        if (r.status === 'running') {
            toast(`SMTP server running on ${host}:${port}`);
        } else {
            toast('Failed to start server', 'error');
        }
        showPage('smtp-server');
    }

    async function stopSMTPServer() {
        toast('Stopping SMTP server...', 'info');
        const r = await api('/api/smtp-server/stop', 'POST');
        toast('SMTP server stopped');
        showPage('smtp-server');
    }

    async function createProxy(e) {
        e.preventDefault();
        const r = await api('/api/proxies', 'POST', {
            name: document.getElementById('proxy-name').value,
            proxy_type: document.getElementById('proxy-type').value,
            host: document.getElementById('proxy-host').value,
            port: parseInt(document.getElementById('proxy-port').value),
            username: document.getElementById('proxy-user').value,
            password: document.getElementById('proxy-pass').value,
        });
        document.getElementById('modal').remove();
        toast('Proxy created!');
        showPage('proxies');
    }

    async function testProxy(id) {
        toast('Testing proxy...', 'info');
        const r = await api(`/api/proxies/${id}/test`, 'POST');
        if (r.healthy) {
            toast(`Proxy working! Latency: ${r.latency}ms via ${r.proxy_type}`);
        } else {
            toast(`Proxy failed: ${r.error}`, 'error');
        }
        showPage('proxies');
    }

    async function testAllProxies() {
        toast('Testing all proxies...', 'info');
        const r = await api('/api/proxies/test-all', 'POST');
        let healthy = 0, failed = 0;
        for (const p of r) { if (p.healthy) healthy++; else failed++; }
        toast(`${healthy} healthy, ${failed} failed`);
        showPage('proxies');
    }

    async function deleteProxy(id) {
        if (!confirm('Delete this proxy?')) return;
        await api(`/api/proxies/${id}`, 'DELETE');
        toast('Proxy deleted');
        showPage('proxies');
    }

    async function doBulkImportProxies() {
        const raw = document.getElementById('bulk-proxy-input').value;
        if (!raw.trim()) { toast('Paste some proxies first', 'error'); return; }
        document.getElementById('modal').remove();
        toast('Importing proxies...', 'info');
        const r = await api('/api/proxies/bulk-import', 'POST', { proxies: raw });
        if (r.imported > 0) {
            toast(`Imported ${r.imported} proxies!${r.skipped > 0 ? ` (${r.skipped} skipped)` : ''}`);
        } else {
            toast('No proxies parsed. Check the format.', 'error');
        }
        showPage('proxies');
    }

                                <div class="font-semibold text-sm">GitHub Issues</div>
                                <div class="text-xs text-gray-400">Report bugs & feature requests</div>
                            </div>
                        </a>
                    </div>
                </div>
            </div>`;
    }

    function copyAddr(addr, btn) {
        navigator.clipboard.writeText(addr).then(() => {
            const icon = btn.querySelector('i');
            icon.className = 'fas fa-check text-green-400';
            setTimeout(() => { icon.className = 'fas fa-copy'; }, 1500);
            toast('Address copied!');
        });
    }

    // ========== INIT ==========
    showPage('dashboard');
    </script>
</body>
</html>
